name: Motion
model_type: LucidFlux2LoRAJEPA_model
is_train: true
report_to: [comet_ml, tensorboard]
push_to_hub: false
num_gpu: 2
seed: 42
mixed_precision: bf16
allow_tf32: true

# Flux 2 Klein 4B backbone with LoRA training on transformer
pretrained_model_name_or_path: black-forest-labs/FLUX.2-klein-4B
revision: ~
variant: ~

# Optional SwinIR prior for JEPA pre-processing.
swinir_model_path: /depot/chan129/users/harshana/LucidFlux/weights/swinir.pth

# V-JEPA 2.1 backbone configuration.
vjepa_hub_entry: vjepa2_1_vit_large_384
vjepa_image_size: 384
vjepa_pretrained: true
vjepa_checkpoint_path: ~

# Precomputed null prompt embeddings from the Flux2 text encoder.
precomputed_embeddings_path: /home/wweligam/svd_v2/playground/null_prompt_embeddings_flux2_klein.pt

guidance_scale: 1.0
discrete_flow_shift: 3.1582
transformer_gradient_checkpointing: true

tracker_project_name: Motion
experiment_key: LucidFlux2LoRAJEPA

datasets:
  train:
    type: ImagePairDataset
    data_dir: /depot/chan129/data/Deblur_MIOR/train/
    split: train
    lq_folder: blur
    gt_folder: gt
    lq_key: blur
    gt_key: gt
    return_name: true
    recursive: true
    match_by_stem: false
    crop_h: 512
    crop_w: 512
    random_crop: true

  val:
    type: ImagePairDataset
    data_dir: /depot/chan129/data/Deblur_MIOR/val/
    split: test
    lq_folder: blur
    gt_folder: gt
    lq_key: blur
    gt_key: gt
    return_name: true
    recursive: true
    match_by_stem: false
    crop_h: 512
    crop_w: 512
    random_crop: false

path:
  root: /scratch/gilbreth/wweligam/experiments
  logging_dir: logs
  resume_from_path: ~
  resume_from_checkpoint: ~

train:
  # LoRA knobs consumed by LucidFlux2LoRAJEPA_model
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.0
  # lora_target_modules: [to_q, to_k, to_v, to_out.0, proj_out, ff.net, context_embedder, x_embedder]

  optim:
    type: adamw
    scale_lr: false
    learning_rate: !!float 1e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 0.01
    adam_epsilon: !!float 1e-8
    max_grad_norm: 1.0

  scheduler:
    type: constant_with_warmup
    lr_warmup_steps: 500
    lr_num_cycles: 1
    lr_power: 1.0

  gradient_accumulation_steps: 4
  num_train_epochs: 20
  batch_size: 1

  max_train_steps: 20000
  validation_steps: 200
  checkpointing_steps: 500
  checkpoints_total_limit: 3

  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 4

val:
  save_images: true
  num_inference_steps: 28
  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 4
  batch_size: 1
  max_val_steps: 5

  metrics:
    psnr:
      crop: 30
    mse:
      crop: 30
