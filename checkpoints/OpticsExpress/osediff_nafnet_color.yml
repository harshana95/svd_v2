name: MetaZoom
model_type: PixelSpace_onedataset_model
is_train: true
report_to: comet_ml
push_to_hub: false
num_gpu: 8
seed: 10
mixed_precision: !!str no
allow_tf32: false
# pretrained_model_name_or_path: stabilityai/stable-diffusion-xl-base-1.0
pretrained_model_name_or_path: stabilityai/stable-diffusion-2-1
vlm_model_path: /depot/chan129/users/harshana/svd_v2/weights/ram_swin_large_14m.pth
dape_path: ~ #/depot/chan129/users/harshana/svd_v2/DAPE.pth
revision: ~
variant: ~
use_ema: false
image_resolution: [512, 512]
tracker_project_name: MetaZoom
experiment_key: MetaZoom_OSEDiff_NAFNet_color
dataset_1_name: harshana95/quadratic_color_psfs_5db_updated_real_hybrid_Flickr2k_gt_v2_PCA_interp_file
dataset_2_name: harshana95/quadratic_mono_psfs_5db_updated_real_hybrid_Flickr2k_gt_v2_PCA_interp_file
# dataset_1_name: /depot/chan129/users/harshana/Datasets/MetaZoom_New_aligned/1x/
# dataset_2_name: /depot/chan129/users/harshana/Datasets/MetaZoom_New_aligned/5x/

datasets:
  train:
    type: HuggingFaceDataset
    name: ${dataset_1_name}
    split: train
    num_proc: 1
    map_batch_size: 16

    use_shuffle: true
    num_worker_per_gpu: 4
    gt_key: gt
    lq_key: blur
    rf_key: refined

    common_transforms_keys: [gt, blur]
    transforms:
      to_tensor:
      homography:
        keys: [lq_key]
        M: [[ 1.03423862e+00,  1.72696887e-02, -4.47710015e+01], [-2.09817427e-02,  1.04563574e+00, -1.91616278e+01], [-1.40655326e-05,  8.16967266e-07,  1.00000000e+00]]
      crop:
        h: 1024
        w: 1024
      resize:
        factor: 0.5
      rotate:
        angle: -90
      # apply_model:
      #   keys: [lq_key]
      #   model_name: NAFNet_arch
      #   model_path: /scratch/gilbreth/wweligam/experiments/SVD_Real/NAFNetRealColor 2025 09 12 11.09.55/checkpoint-15000/NAFNet_arch_1/
      normalize:
        mean: [0.5, 0.5, 0.5]
        std: [0.5, 0.5, 0.5]

  val:
    type: HuggingFaceDataset
    name: ${dataset_1_name}
    split: validation
    num_proc: 1

    use_shuffle: false
    gt_key: gt
    lq_key: blur
    rf_key: refined
    
    common_transforms_keys: [gt, blur]
    transforms:
      to_tensor:
      homography:
        keys: [lq_key]
        M: [[ 1.03423862e+00,  1.72696887e-02, -4.47710015e+01], [-2.09817427e-02,  1.04563574e+00, -1.91616278e+01], [-1.40655326e-05,  8.16967266e-07,  1.00000000e+00]]
      crop:
        h: 1024
        w: 1024
      resize:
        factor: 0.5
      rotate:
        angle: -90
      # apply_model:
      #   keys: [lq_key]
      #   model_name: NAFNet_arch
      #   model_path: /scratch/gilbreth/wweligam/experiments/SVD_Real/NAFNetRealColor 2025 09 12 11.09.55/checkpoint-15000/NAFNet_arch_1/
      normalize:
        mean: [0.5, 0.5, 0.5]
        std: [0.5, 0.5, 0.5]

# network structures
network:
  type: NAFNet
  in_channels: 3
  out_channels: 3
  width: 32
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]


# path
path:
  root: /scratch/gilbreth/wweligam/experiments
  logging_dir: logs
  resume_from_path: /scratch/gilbreth/wweligam/experiments/MetaZoom/MetaZoom_OSEDiff_NAFNet_color_no_VSD 2025 12 07 15.54.23/
  resume_from_checkpoint: latest

# training settings
train:
  optim:
    scale_lr: false
    use_8bit_adam: false
    learning_rate: !!float 5e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 0.01
    adam_epsilon: !!float 1e-8
    max_grad_norm: 1.0

  scheduler:
    type: cosine_with_restarts
    lr_warmup_steps: 500
    lr_num_cycles: 3
    lr_power: 1.0

  loss: 1*MSE
  gradient_accumulation_steps: 1
  num_train_epochs: 10
  batch_size: 6


  lora_finetune: true
  use_hf_loss: false
  use_adapter: false
  adapter_in_channels: 1
  hpf_adapter_input: false
  timestep: 999
  lambda_kl: 1.0
  lambda_l2: 1.0
  lambda_lpips: 2.0
  cfg_vsd: 7.5

  max_train_steps: 200000
  validation_steps: 5000
  checkpointing_steps: 10000
  checkpoints_total_limit: 2

  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 8

# validation settings
val:
  save_images: true
  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 16
  batch_size: 1

  metrics:
    psnr: # metric name, can be arbitrary
      crop: 30
    mse:
       crop: 30
