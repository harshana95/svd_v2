psf_data_path: /scratch/gilbreth/wweligam/dataset/gaussian_synthetic
save_dir: /depot/chan129/users/harshana/Datasets/Synthetic/
gt_crop: ~
cap_crop: ~
val_perc: 1.0

dataset:
  type: DeepLensDeblurDataset
  gt_dataset_path: /depot/chan129/users/harshana/Datasets/Deconvolution/hybrid_Flickr2k_gt_v2/
  gt_dataset_file_pattern: !!str \*
  gt_key: gt
  lq_key: blur
  data_percent: [0,100]
  num_proc: 1
  render_method: 'psf_patch'
  lens_path: /depot/chan129/users/harshana/svd_v2/lenses/camera/rf50mm_f1.8.json
  sensor_res: [1024, 1024]
  num_frames: 5
  offset_power: 0.2

  transforms:
    to_tensor:
      keys: [gt_key]
    select_channels:
      keys: [gt_key]
      channels: [True, True, True, False]
    crop:
      keys: [gt_key]
      h: 1024
      w: 1024

    resize:
      keys: [gt_key]
      factor: 1