# Blur2Vid using Wan2.1 I2V (image-to-video) with optical flow
name: Blur2VidOF
model_type: Blur2Vid_Wan_OF_model
is_train: true
report_to: comet_ml
push_to_hub: false
num_gpu: 8
seed: 10
mixed_precision: bf16
allow_tf32: false

tracker_project_name: Blur2VidOF
experiment_key: Blur2Vid_wan21_480p_opticalflow

args:
  # Wan2.1 I2V 480P (14B, smaller resolution ~8–12GB VRAM vs 720P)
  pretrained_model_name_or_path: Wan-AI/Wan2.1-I2V-14B-480P-Diffusers
  revision: main
  height: 352
  width: 640
  fps: 8
  max_num_frames: 17
  enable_slicing: true
  enable_tiling: true

  # LoRA to fit ~80GB: only train adapters (default on)
  lora_finetune: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  # Wan attention + image conditioning projections
  lora_target_modules: ["to_q", "to_k", "to_v", "to_out", "add_k_proj", "add_v_proj"]

  seed: ${seed}
  num_inference_steps: 50
  num_validation_videos: 1
  guidance_scale: 5.0
  negative_prompt: "blur, low quality, static"
  validation_prompt: ""

datasets:
  train:
    type: FullMotionBlurDataset
    data_dir: /scratch/gilbreth/wweligam/experiments/blur2vid/datasets/FullDataset/
    image_size: [352, 640]
    split: [0.02, 1.0]
    num_proc: 2

    use_shuffle: true
    num_worker_per_gpu: 2

  val:
    type: FullMotionBlurDataset
    data_dir: /scratch/gilbreth/wweligam/experiments/blur2vid/datasets/FullDataset/
    image_size: [352, 640]
    split: [0.0, 0.02]
    num_proc: 2

    use_shuffle: false

path:
  root: /scratch/gilbreth/wweligam/experiments
  logging_dir: logs
  resume_from_path: /scratch/gilbreth/wweligam/experiments/Blur2VidOF/Blur2Vid_wan21_480p_opticalflow_2026_02_27_10_15_41/
  resume_from_checkpoint: latest

train:
  optim:
    scale_lr: false
    use_8bit_adam: false
    learning_rate: !!float 1e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_weight_decay: 0.0001
    adam_epsilon: !!float 1e-8
    max_grad_norm: 1.0

  scheduler:
    type: cosine_with_restarts
    lr_warmup_steps: 500
    lr_num_cycles: 3
    lr_power: 1.0

  loss: 1*MSE
  gradient_accumulation_steps: 1
  num_train_epochs: 10
  batch_size: 1

  max_train_steps: 50000
  validation_steps: 1000
  checkpointing_steps: 1000
  checkpoints_total_limit: 2

  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 8

val:
  save_images: true
  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 16
  batch_size: 1

  metrics:
    psnr:
      crop: 30
    mse:
      crop: 30
