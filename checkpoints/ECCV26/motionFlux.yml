# Flux control training: blur (lq) as conditioning, sharp (gt) as target.
# Uses FluxDeblur_model: FluxTransformer2DModel + FluxControlPipeline text encoding.
#
# Run: python trainer.py -opt checkpoints/ECCV26/motionFluxDeblur.yml -comment my_run
# Or:  accelerate launch trainer.py -opt checkpoints/ECCV26/motionFluxDeblur.yml -comment my_run
#
name: Motion
model_type: FluxDeblur_model
is_train: true
report_to: comet_ml
push_to_hub: false
num_gpu: 2
seed: 10
mixed_precision: bf16
allow_tf32: true
# Note: To use FSDP (Fully Sharded Data Parallel) for model parallelism across 2 GPUs,
# use the accelerate config file: accelerate_config_fsdp.yaml
# Run: accelerate launch --config_file accelerate_config_fsdp.yaml trainer.py -opt checkpoints/ECCV26/motionFluxDeblur.yml

# Flux pretrained (e.g. FLUX.1-dev; must have transformer, vae, scheduler, text encoders)
pretrained_model_name_or_path: black-forest-labs/FLUX.1-dev
revision: ~
variant: ~

# Captioning for prompts (RAM)
vlm_model_path: /depot/chan129/users/harshana/svd_v2/ram_swin_large_14m.pth
dape_path: ~

# Flux control options
guidance_scale: 3.5
only_target_transformer_blocks: false
weighting_scheme: none   # none | sigma_sqrt | logit_normal | mode | cosmap
# logit_mean: 0.0
# logit_std: 1.0
# mode_scale: 1.29
# Initialize control branch so model sees blur from step 1 (reduces flat/checkerboard). 0 = zero-init.
control_init_scale: 0.5
# Caption from sharp (GT) image during training so text matches target. Inference still uses blur.
caption_from_gt: true


tracker_project_name: Motion
experiment_key: FluxDeblur

datasets:
  train:
    type: SyntheticMotionBlurDataset
    name: /depot/chan129/users/harshana/Datasets/Deconvolution/hybrid_Flickr2k_gt_v2/
    split: train
    split_range: [0, 99]
    is_train: true
    global_blur: true
    return_meta: false
    kernel_size: 64
    gt_key: image
    lq_key: blur
    num_proc: 8
    num_worker_per_gpu: 4
    transforms:
      to_tensor:
        keys: [gt_key]
      select_channels:
        keys: [gt_key]
        channels: [True, True, True, False]
      crop:
        keys: [gt_key]
        h: 1024
        w: 1024
      resize:
        keys: [gt_key]
        h: 512
        w: 512
    foreground_dataset:
      name: /scratch/gilbreth/wweligam/dataset/foreground_images/foreground/
      split: train
      split_range: [1, 100]
      transforms:
        to_tensor:
          keys: [gt_key]
        crop:
          keys: [gt_key]
          h: 1024
          w: 1024
        resize:
          keys: [gt_key]
          h: 512
          w: 512
  val:
    type: SyntheticMotionBlurDataset
    name: /depot/chan129/users/harshana/Datasets/Deconvolution/hybrid_Flickr2k_gt_v2/
    split: train
    split_range: [99, 100]
    is_train: false
    global_blur: true
    return_meta: false
    kernel_size: 64
    gt_key: image
    lq_key: blur
    num_proc: 1
    num_worker_per_gpu: 1
    use_shuffle: false
    transforms:
      to_tensor:
        keys: [gt_key]
      select_channels:
        keys: [gt_key]
        channels: [True, True, True, False]
      crop:
        keys: [gt_key]
        h: 1024
        w: 1024
      resize:
        keys: [gt_key]
        h: 512
        w: 512
    foreground_dataset:
      name: /scratch/gilbreth/wweligam/dataset/foreground_images/foreground/
      split: train
      split_range: [0, 1]
      transforms:
        to_tensor:
          keys: [gt_key]
        crop:
          keys: [gt_key]
          h: 1024
          w: 1024
        resize:
          keys: [gt_key]
          h: 512
          w: 512
path:
  root: /scratch/gilbreth/wweligam/experiments
  logging_dir: logs
  resume_from_path: /scratch/gilbreth/wweligam/experiments/Motion/FluxDeblur_2026_03_08_01_31_13/
  resume_from_checkpoint: latest

train:
  optim:
    scale_lr: false
    use_8bit_adam: true  # Use 8-bit AdamW to reduce optimizer state memory by ~4x
    learning_rate: !!float 4e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 0.01
    adam_epsilon: !!float 1e-8
    max_grad_norm: 1.0

  scheduler:
    type: constant
    lr_warmup_steps: 500
    lr_num_cycles: 1
    lr_power: 1.0

  gradient_accumulation_steps: 1
  num_train_epochs: 10
  batch_size: 1

  lora_finetune: true

  max_train_steps: 500000
  validation_steps: 5000
  checkpointing_steps: 5000
  checkpoints_total_limit: 2

  patched: false
  patch_size_h: 512
  patch_size_w: 512
  patch_overlap: 0.2
  max_minibatch: 4

val:
  save_images: true
  # Reduce GPU memory (Flux ~12B params): offload pipeline to CPU between steps. Slower but fits 80GB.
  use_cpu_offload: false
  num_inference_steps: 50
  patched: false
  patch_size_h: 512
  patch_size_w: 512
  patch_overlap: 0.2
  max_minibatch: 4
  batch_size: 1
  max_val_steps: 1

  metrics:
    psnr:
      crop: 30
    mse:
      crop: 30
