# Blur_model for motion blur: train a network to predict blurred image from sharp (GT) + metadata.
# Input: GT (sharp) image + metadata (downsampled blur kernel vector).
# Output: Blurred image.
# Dataset: SyntheticMotionBlurDataset with return_meta=true provides (gt, blur, meta).
#
# Run: python trainer.py -opt checkpoints/ECCV26/motionBlurBlur.yml -comment my_run
# Or:  accelerate launch trainer.py -opt checkpoints/ECCV26/motionBlurBlur.yml -comment my_run
#
name: Motion
model_type: Blur_model
is_train: true
report_to: comet_ml
push_to_hub: false
num_gpu: 2
seed: 10
mixed_precision: bf16
allow_tf32: true

# Blur_model: metadata key and dimension (must match dataset meta)
meta_key: meta
kernel_size: 64   # downsampled kernel size for meta vector (meta_dim = kernel_size**2)

tracker_project_name: Motion
experiment_key: Blur_model_latent

datasets:
  train:
    type: SyntheticMotionBlurDataset
    name: /depot/chan129/users/harshana/Datasets/Deconvolution/hybrid_Flickr2k_gt_v2/
    split: train
    split_range: [0, 99]
    is_train: true
    global_blur: true
    return_meta: true
    skip_frames: 4
    meta_key: ${meta_key}
    kernel_size: ${kernel_size}
    gt_key: image
    lq_key: blur
    num_proc: 4
    num_worker_per_gpu: 4
    transforms:
      to_tensor:
        keys: [gt_key]
      select_channels:
        keys: [gt_key]
        channels: [True, True, True, False]
      crop:
        keys: [gt_key]
        h: 1024
        w: 1024
      resize:
        keys: [gt_key]
        h: 512
        w: 512
    foreground_dataset:
      name: /scratch/gilbreth/wweligam/dataset/foreground_images/foreground/
      split: train
      split_range: [1, 100]
      transforms:
        to_tensor:
          keys: [gt_key]
        crop:
          keys: [gt_key]
          h: 1024
          w: 1024
        resize:
          keys: [gt_key]
          h: 512
          w: 512

  val:
    type: SyntheticMotionBlurDataset
    name: /depot/chan129/users/harshana/Datasets/Deconvolution/hybrid_Flickr2k_gt_v2/
    split: train
    split_range: [99, 100]
    is_train: false
    global_blur: true
    return_meta: true
    skip_frames: 4
    meta_include_kernel: true
    meta_key: ${meta_key}
    kernel_size: ${kernel_size}
    gt_key: image
    lq_key: blur
    num_proc: 1
    num_worker_per_gpu: 1
    use_shuffle: false
    transforms:
      to_tensor:
        keys: [gt_key]
      select_channels:
        keys: [gt_key]
        channels: [True, True, True, False]
      crop:
        keys: [gt_key]
        h: 1024
        w: 1024
      resize:
        keys: [gt_key]
        h: 512
        w: 512
    foreground_dataset:
      name: /scratch/gilbreth/wweligam/dataset/foreground_images/foreground/
      split: train
      split_range: [0, 1]
      transforms:
        to_tensor:
          keys: [gt_key]
        crop:
          keys: [gt_key]
          h: 1024
          w: 1024
        resize:
          keys: [gt_key]
          h: 512
          w: 512

# network: in_channels = 16 (image) + meta_dim (64) = 80
network:
  type: NAFNet
  in_channels: 80
  out_channels: 16
  width: 32
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]

vae_name_or_path: stabilityai/stable-diffusion-3.5-medium
vae_subfolder: vae

meta_vae:
  type: AutoencoderKL
  in_channels: 50
  out_channels: 50
  latent_channels: 64
  sample_size: 512
  scaling_factor: 0.18215
  down_block_types: [DownEncoderBlock2D, DownEncoderBlock2D, DownEncoderBlock2D, DownEncoderBlock2D]
  up_block_types: [UpDecoderBlock2D, UpDecoderBlock2D, UpDecoderBlock2D, UpDecoderBlock2D]
  block_out_channels: [32, 64, 128, 256]
  force_upcast: true
  use_quant_conv: true
  use_post_quant_conv: true
  mid_block_add_attention: true

path:
  root: /scratch/gilbreth/wweligam/experiments
  logging_dir: logs
  resume_from_path: ~
  resume_from_checkpoint: ~

train:
  optim:
    scale_lr: false
    use_8bit_adam: false
    learning_rate: !!float 2e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 0.01
    adam_epsilon: !!float 1e-8
    max_grad_norm: 1.0

  scheduler:
    type: cosine_with_restarts
    lr_warmup_steps: 500
    lr_num_cycles: 3
    lr_power: 1.0

  loss: 1*MSE
  gradient_accumulation_steps: 1
  num_train_epochs: 10
  batch_size: 8

  max_train_steps: 30000
  validation_steps: 100
  checkpointing_steps: 100
  checkpoints_total_limit: 2

  patched: true
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 4

val:
  save_images: true
  patched: true
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 8
  batch_size: 1
  max_val_steps: 10

  metrics:
    psnr:
      crop: 30
    mse:
      crop: 30
