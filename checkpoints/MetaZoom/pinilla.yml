name: MetaZoom
model_type: Simple_model
is_train: true
report_to: comet_ml
push_to_hub: false
num_gpu: 8
seed: 10
mixed_precision: !!str no
allow_tf32: false
tracker_project_name: MetaZoom
experiment_key: Pinilla
dataset_1_name: harshana95/quadratic_color_psfs_5db_updated_real_hybrid_Flickr2k_gt_v2_PCA_interp_file

datasets:
  train:
    type: HuggingFaceDataset
    name: ${dataset_1_name}
    split: train
    num_proc: 4
    map_batch_size: 16
    skip_cache: false

    use_shuffle: true
    num_worker_per_gpu: 4
    gt_key: gt
    lq_key: blur

    common_transforms_keys: [gt, blur]
    transforms:
      to_tensor:
      # homography:
      #   keys: [lq_key]
      #   M: [[ 1.03423862e+00,  1.72696887e-02, -4.47710015e+01], [-2.09817427e-02,  1.04563574e+00, -1.91616278e+01], [-1.40655326e-05,  8.16967266e-07,  1.00000000e+00]]
      crop:
        h: 1024
        w: 1024
      resize:
        factor: 0.5
      select_channels:
        channels: [True, True, True]
      rotate:
        angle: -90
      sv_convolution:
        keys: [gt_key]
        keys_new: [lq_key]
        basis_psfs: "/depot/chan129/users/harshana/svd_v2/checkpoints/MetaZoom/pinilla_psf.npy"
        basis_coef: "/depot/chan129/users/harshana/svd_v2/checkpoints/MetaZoom/pinilla_coeff.npy"
        constant_values_psfs: 0
        constant_values_coef: 1
        h: 512
        w: 512
      rescale:
        keys: [lq_key]
        factor: 3
      poisson_noise:
        keys: [lq_key]
        peak: 1000
        peak_dc: 50
      gaussian_noise:
        keys: [lq_key]
        max_sigma: 0.02
        sigma_dc: 0.005
        mu: 0

  val:
    type: HuggingFaceDataset
    name: ${dataset_1_name}
    split: validation
    num_proc: 1
    skip_cache: false

    use_shuffle: false
    num_worker_per_gpu: 4
    gt_key: gt
    lq_key: blur
    
    common_transforms_keys: [gt, blur]
    transforms:
      to_tensor:
      # homography:
      #   keys: [lq_key]
      #   M: [[ 1.03423862e+00,  1.72696887e-02, -4.47710015e+01], [-2.09817427e-02,  1.04563574e+00, -1.91616278e+01], [-1.40655326e-05,  8.16967266e-07,  1.00000000e+00]]
      crop:
        h: 1024
        w: 1024
      resize:
        factor: 0.5
      select_channels:
       keys: [gt]
       channels: [True, True, True]
      rotate:
        angle: -90
      sv_convolution:
        keys: [gt_key]
        keys_new: [lq_key]
        basis_psfs: "/depot/chan129/users/harshana/svd_v2/checkpoints/MetaZoom/pinilla_psf.npy"
        basis_coef: "/depot/chan129/users/harshana/svd_v2/checkpoints/MetaZoom/pinilla_coeff.npy"
        constant_values_psfs: 0
        constant_values_coef: 1
        h: 512
        w: 512
      rescale:
        keys: [lq_key]
        factor: 3
      poisson_noise:
        keys: [lq_key]
        peak: 1000
        peak_dc: 50
      gaussian_noise:
        keys: [lq_key]
        max_sigma: 0.02
        sigma_dc: 0.005
        mu: 0
      
# network structures
network:
  type: PinillaUnet
  in_channels: 3
  out_channels: 3

discriminator:
  type: PinillaDiscriminator
  in_channels: 6


# path
path:
  root: /scratch/gilbreth/wweligam/experiments
  logging_dir: logs
  resume_from_path: ~ #/scratch/gilbreth/wweligam/experiments/MetaZoom/Pinilla_2026_01_24_00_58_35/
  resume_from_checkpoint: ~ #latest

# training settings
train:
  optim:
    scale_lr: false
    use_8bit_adam: false
    learning_rate: !!float 2e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 0.01
    adam_epsilon: !!float 1e-8
    max_grad_norm: 1.0

  scheduler:
    type: constant
    lr_warmup_steps: 500
    lr_num_cycles: 3
    lr_power: 1.0

  loss: 1*MSE #|0.6*Perceptual_loss
  gradient_accumulation_steps: 1
  num_train_epochs: 10
  batch_size: 32

  max_train_steps: 50000
  validation_steps: 100
  checkpointing_steps: 1000
  checkpoints_total_limit: 2

  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 8

# validation settings
val:
  save_images: true
  patched: false
  patch_size_h: 256
  patch_size_w: 256
  patch_overlap: 0.2
  max_minibatch: 16
  batch_size: 1

  metrics:
    psnr: # metric name, can be arbitrary
      crop: 30
    mse:
       crop: 30
